<h1>Eventos</h1>
<hr>

<div class="form-inline">
    <div class="form-group mb-2">
      <label class="me-3"> Filtro:</label>
        <input type="text" class="form-me-2" placeholder="buscar"
        [(ngModel)]="filtroLista"
        >
        <button class="btn btn-outline-success ms-2">Buscar</button>
    </div>
</div>
<!-- <h3>Filtro: {{filtroLista}} </h3> -->
<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th>
                <button type="button" class="btn btn-outline-light btn-sm"
                    (click)="alterarImagem()">
                    {{!mostrarImagem ? 'Exibir' : 'Ocultar'}}

                    </button>
            </th>
            <th>#</th>
            <th>Tema</th>
            <th>Local</th>
            <th>Data</th>
            <th>Qtd Pessoas</th>
            <th>Lote</th>
            <th>Opções</th>
        </tr>
    </thead>
    <tbody *ngIf="eventos.length">
        <tr *ngFor="let evento of eventosFiltrados">
            <td>
                <img [collapse]="!mostrarImagem"
                [isAnimated]="true"
                 src="/assets/{{evento.imagemURL}}"alt=""
                [style.width.px]="larguraImagem"
                [style.margin.px]="margemImagem">
            </td>
            <td>{{evento.eventoId}}</td>
            <td>{{evento.tema}}</td>
            <td>{{evento.local}}</td>
            <td>{{evento.dataEvento}}</td>
            <td>{{evento.qtdPessoas}}</td>
            <td>{{evento.lote}}</td>
            <td>
              <button type="button" class="btn btn-primary btn-sm me-2">Editar</button>
              <button type="button" class="btn btn-danger btn-sm">Excluir</button>
            </td>
        </tr>
    </tbody>
    <tfoot *ngIf="!eventos.length">
        <tr>
            <td colspan="8" class="text-center">
                <h4>Nenhum evento encontrado!</h4>
            </td>
        </tr>
    </tfoot>
</table>
